<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>단골집 주문</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Gothic+A1:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Gothic A1', sans-serif; background: #F1EBE4; color: #231910; }
    .app { max-width: 480px; margin: 0 auto; background: #FFF8F2; min-height: 100vh; }
    .screen { display: none; }
    .screen.active { display: block; }

    /* 공통 */
    .topbar { display: flex; align-items: center; gap: 12px; padding: 18px 20px; background: #fff; border-bottom: 1px solid #F3EAE1; }
    .topbar-title { font-family: 'Jua', sans-serif; font-size: 21px; color: #231910; flex: 1; line-height: 1.2; }
    .topbar-group { flex: 1; }
    .topbar-sub { font-size: 14px; color: #9A8676; margin-top: 2px; }
    .back-btn { width: 40px; height: 40px; flex-shrink: 0; border-radius: 13px; border: none; background: #FBF1E8; font-size: 22px; cursor: pointer; color: #7A6757; display: flex; align-items: center; justify-content: center; padding: 0; }
    .logout-btn { font-size: 13px; font-weight: 700; padding: 8px 14px; border-radius: 999px; border: 1px solid #EADFD3; background: none; cursor: pointer; color: #A2917F; }

    /* 음식 클레이 아이콘 */
    .food-icon { display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .food-icon--sm { width: 42px; height: 42px; font-size: 23px; border-radius: 14px; }
    .food-icon--md { width: 62px; height: 62px; font-size: 33px; border-radius: 20px; }
    .food-icon--lg { width: 60px; height: 60px; font-size: 32px; border-radius: 19px; }
    .food-icon--xl { width: 74px; height: 74px; font-size: 38px; border-radius: 24px; }
    .food-icon--hero { width: 96px; height: 96px; font-size: 50px; border-radius: 30px; }
    .icon-orange { background: linear-gradient(150deg,#FFC785,#FF9442); box-shadow: 0 9px 16px -6px rgba(190,95,40,.5), inset 0 4px 6px rgba(255,255,255,.6), inset 0 -7px 10px rgba(150,70,25,.3); }
    .icon-red { background: linear-gradient(150deg,#FF9D8A,#FF6A52); box-shadow: 0 9px 16px -6px rgba(190,75,55,.5), inset 0 4px 6px rgba(255,255,255,.55), inset 0 -7px 10px rgba(160,55,40,.32); }
    .icon-yellow { background: linear-gradient(150deg,#FFDC7A,#FFB22E); box-shadow: 0 9px 16px -6px rgba(190,140,40,.5), inset 0 4px 6px rgba(255,255,255,.6), inset 0 -7px 10px rgba(160,110,25,.3); }
    .icon-tomato { background: linear-gradient(150deg,#FF9F7E,#F2603D); box-shadow: 0 9px 16px -6px rgba(190,75,45,.5), inset 0 4px 6px rgba(255,255,255,.55), inset 0 -7px 10px rgba(160,55,35,.32); }
    .icon-green { background: linear-gradient(150deg,#B6DD8E,#7FC15F); box-shadow: 0 9px 16px -6px rgba(110,150,60,.5), inset 0 4px 6px rgba(255,255,255,.55), inset 0 -7px 10px rgba(90,120,45,.3); }

    /* 로그인 */
    .login-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding: 40px; gap: 24px; }
    .login-title { font-family: 'Jua', sans-serif; font-size: 30px; text-align: center; }
    .login-sub { font-size: 15px; color: #9A8676; text-align: center; line-height: 1.7; }
    .google-btn { display: flex; align-items: center; gap: 12px; padding: 0 28px; height: 60px; border: 2px solid #EFE2D5; border-radius: 18px; background: #fff; font-size: 17px; font-weight: 800; cursor: pointer; width: 100%; justify-content: center; color: #231910; }
    .google-btn:active { background: #FFF6EF; }
    .inapp-notice { width: 100%; padding: 18px; background: #FFF3E7; border: 1.5px solid #FBDBB5; border-radius: 24px; text-align: center; }
    .inapp-notice-title { font-weight: 800; font-size: 16px; color: #B5651A; margin-bottom: 10px; }
    .inapp-notice-desc { font-size: 14px; color: #8A7868; line-height: 1.7; margin-bottom: 14px; }
    .inapp-notice .copy-btn { width: 100%; }

    /* 홈(관리자) */
    .store-list { padding: 14px; display: flex; flex-direction: column; gap: 14px; }
    .store-card { background: #fff; border: 1px solid #F0E4D8; border-radius: 24px; padding: 16px; box-shadow: 0 8px 18px -12px rgba(150,90,50,.35); }
    .store-card-head { display: flex; gap: 13px; align-items: center; }
    .store-info { flex: 1; min-width: 0; }
    .store-name { font-family: 'Jua', sans-serif; font-size: 22px; line-height: 1.1; }
    .store-meta { font-size: 14px; color: #9A8676; margin-top: 4px; }
    .store-menus { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 12px; }
    .menu-tag { background: #FFF1E6; color: #C2571F; font-size: 13px; font-weight: 700; border-radius: 999px; padding: 6px 12px; }
    .store-actions { display: flex; gap: 9px; margin-top: 14px; }
    .btn-sm { flex: 1; text-align: center; height: 46px; line-height: 46px; border-radius: 14px; border: none; font-size: 16px; font-weight: 800; cursor: pointer; background: #FBF1E8; color: #9A6A3C; }
    .btn-sm.danger { background: #FCECEC; color: #D14B3C; }
    .add-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: calc(100% - 28px); margin: 0 14px 14px; height: 56px; border-radius: 20px; border: 2px dashed #E3CDB6; background: #FFFBF6; cursor: pointer; font-size: 17px; font-weight: 800; color: #B07A45; }

    /* 공유 패널 */
    .share-panel { margin: 0 14px 14px; padding: 18px; background: #FFF3E7; border: 1.5px solid #FBDBB5; border-radius: 24px; }
    .share-label { font-weight: 800; font-size: 16px; color: #B5651A; display: flex; align-items: center; gap: 7px; margin-bottom: 12px; }
    .share-url { font-size: 13px; color: #8A7868; word-break: break-all; line-height: 1.4; padding: 12px 14px; background: #fff; border-radius: 14px; border: 1px solid #F0DEC7; }
    .share-btns { display: flex; gap: 9px; margin-top: 12px; }
    .copy-btn { flex: 1; text-align: center; height: 52px; font-size: 16px; font-weight: 800; border-radius: 15px; border: 1.5px solid #EAD6BC; background: #fff; color: #8A6A45; cursor: pointer; }
    .kakao-btn { flex: 1.3; text-align: center; height: 52px; font-size: 16px; font-weight: 900; border-radius: 15px; border: none; background: #FEE500; color: #3C1E1E; cursor: pointer; box-shadow: 0 8px 16px -8px rgba(220,195,0,.7); }

    /* 우리집 주소 */
    .address-row { display: flex; gap: 9px; }
    .address-row input { flex: 1; }
    .address-save-btn { flex-shrink: 0; padding: 0 22px; height: 60px; font-size: 16px; font-weight: 800; border-radius: 18px; border: none; background: linear-gradient(180deg,#FF8A3D,#F26A1B); color: #fff; cursor: pointer; box-shadow: 0 8px 15px -7px rgba(230,99,30,.6); }

    /* 가게 등록/수정 폼 */
    .form-section { padding: 22px 20px; display: flex; flex-direction: column; gap: 22px; }
    .field-label { font-size: 15px; font-weight: 800; color: #7A6757; margin-bottom: 9px; display: block; }
    input[type=text], input[type=tel] { width: 100%; height: 60px; font-size: 18px; padding: 0 18px; border-radius: 18px; border: 2px solid #EFE2D5; outline: none; font-family: inherit; color: #231910; background: #fff; }
    input:focus { border-color: #FF8A3D; }
    .menu-chip-list { display: flex; flex-wrap: wrap; gap: 9px; margin-bottom: 11px; }
    .menu-chip { display: flex; align-items: center; gap: 8px; padding: 9px 14px; background: #FFF1E6; border: none; border-radius: 999px; font-size: 16px; font-weight: 700; color: #C2571F; }
    .menu-chip .del { background: none; border: none; cursor: pointer; font-size: 16px; font-weight: 900; color: #C2571F; opacity: .55; padding: 0; line-height: 1; }
    .menu-input-row { display: flex; gap: 9px; }
    .menu-input-row input { flex: 1; height: 54px; font-size: 16px; border-radius: 16px; }
    .add-menu-btn { width: 54px; height: 54px; flex-shrink: 0; border-radius: 16px; border: none; background: linear-gradient(180deg,#FF8A3D,#F26A1B); cursor: pointer; font-size: 26px; font-weight: 900; color: #fff; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 15px -7px rgba(230,99,30,.6); }
    .save-btn { display: block; width: 100%; height: 64px; font-size: 21px; font-weight: 900; border-radius: 20px; border: none; background: linear-gradient(180deg,#FF8A3D,#F26A1B); color: #fff; cursor: pointer; margin-top: 8px; box-shadow: 0 14px 24px -10px rgba(230,99,30,.65); }
    .save-btn:active { transform: translateY(1px); }

    /* 부모님 홈 */
    .parent-list { padding: 18px; display: flex; flex-direction: column; gap: 14px; }
    .parent-store-card { all: unset; box-sizing: border-box; cursor: pointer; display: flex; align-items: center; gap: 16px; width: 100%; background: #fff; border: 1px solid #F2E9E0; border-radius: 24px; padding: 15px 16px; box-shadow: 0 7px 16px -10px rgba(150,90,50,.3); font-family: inherit; }
    .parent-store-card:active { transform: translateY(1px); }
    .parent-store-info { flex: 1; min-width: 0; }
    .parent-store-name { font-family: 'Jua', sans-serif; font-size: 25px; line-height: 1.15; }
    .parent-store-meta { font-size: 15px; color: #9A8676; margin-top: 3px; }
    .parent-store-arrow { font-size: 34px; color: #E0BCA2; font-weight: 300; line-height: 0; flex-shrink: 0; }

    /* 다시 주문하기 (원터치 재주문) */
    .reorder-section { padding: 18px 18px 0; }
    .reorder-heading { font-family: 'Jua', sans-serif; font-size: 20px; margin: 2px 4px 12px; display: flex; align-items: center; gap: 7px; }
    .reorder-list { display: flex; flex-direction: column; gap: 12px; }
    .reorder-card { all: unset; box-sizing: border-box; cursor: pointer; display: flex; align-items: center; gap: 14px; width: 100%; background: linear-gradient(180deg,#FFF6EC,#FFEEDD); border: 2px solid #FFD3A8; border-radius: 24px; padding: 15px 16px; box-shadow: 0 8px 18px -12px rgba(230,99,30,.45); font-family: inherit; }
    .reorder-card:active { transform: translateY(1px); }
    .reorder-info { flex: 1; min-width: 0; }
    .reorder-store { font-family: 'Jua', sans-serif; font-size: 21px; line-height: 1.15; }
    .reorder-menus { font-size: 15px; color: #9A8676; margin-top: 3px; word-break: keep-all; }
    .reorder-badge { display: inline-block; font-size: 13px; font-weight: 800; color: #E8631E; background: #fff; border: 1px solid #FFD2AE; border-radius: 999px; padding: 4px 11px; margin-top: 8px; }
    .reorder-cta { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 2px; color: #E8631E; font-weight: 900; font-size: 13px; }
    .reorder-cta .ic { font-size: 27px; line-height: 1; }
    .reorder-divider { font-size: 14px; font-weight: 800; color: #B8A795; margin: 22px 22px 2px; }

    /* 메뉴 선택 */
    .order-heading { font-family: 'Jua', sans-serif; font-size: 21px; margin: 18px 18px 4px; }
    .menu-order-list { padding: 16px 18px; display: flex; flex-direction: column; gap: 13px; }
    .menu-item { display: flex; align-items: center; gap: 15px; background: #fff; border: 2px solid #F1E7DD; border-radius: 22px; padding: 15px 16px; cursor: pointer; }
    .menu-item.selected { background: #FFF6EF; border-color: #FF8A3D; box-shadow: 0 8px 16px -10px rgba(230,99,30,.4); }
    .menu-item-name { flex: 1; font-family: 'Jua', sans-serif; font-size: 23px; }
    .menu-check { width: 34px; height: 34px; flex-shrink: 0; border-radius: 50%; border: 2.5px solid #E3D5C8; display: flex; align-items: center; justify-content: center; font-size: 19px; font-weight: 900; color: #fff; }
    .menu-item.selected .menu-check { background: #F26A1B; border-color: #F26A1B; box-shadow: 0 4px 8px -2px rgba(230,99,30,.5); }

    /* 포장/배달 선택 */
    .order-type-heading { font-family: 'Jua', sans-serif; font-size: 21px; margin: 20px 18px 12px; }
    .order-type-toggle { display: flex; gap: 10px; padding: 0 18px 18px; }
    .order-type-btn { flex: 1; height: 60px; border-radius: 20px; border: 2px solid #F1E7DD; background: #fff; font-size: 19px; font-weight: 800; color: #9A8676; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .order-type-btn.selected { background: #FFF6EF; border-color: #FF8A3D; color: #E8631E; box-shadow: 0 8px 16px -10px rgba(230,99,30,.4); }

    /* 주문 바 */
    .order-bar { padding: 16px 18px 22px; background: #fff; border-top: 1px solid #F3EAE1; box-shadow: 0 -10px 24px -16px rgba(120,70,40,.3); }
    .order-summary { font-size: 15px; color: #9A8676; margin: 0 4px 10px; min-height: 21px; }
    .order-summary b { color: #E8631E; }
    .call-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; height: 68px; font-size: 23px; font-weight: 900; border-radius: 22px; border: none; background: linear-gradient(180deg,#FF8A3D,#F26A1B); color: #fff; cursor: pointer; box-shadow: 0 14px 24px -10px rgba(230,99,30,.65); }
    .call-btn:disabled { background: #EFE2D5; color: #C7B7A8; box-shadow: none; cursor: default; }

    /* 주문 메모 */
    .memo-section { padding: 18px; }
    .memo-card { background: #fff; border: 1px solid #F0E4D8; border-radius: 24px; padding: 26px; text-align: center; margin-bottom: 16px; box-shadow: 0 8px 18px -12px rgba(150,90,50,.35); }
    .memo-store-name { font-family: 'Jua', sans-serif; font-size: 25px; margin-bottom: 8px; }
    .memo-phone { font-size: 18px; color: #E8631E; font-weight: 700; }
    .memo-script-label { font-size: 15px; color: #9A8676; margin-bottom: 10px; font-weight: 700; }
    .memo-script { font-size: 22px; font-weight: 700; line-height: 1.8; white-space: pre-line; background: #FFF6EF; border: 2px solid #FFD9B8; border-radius: 22px; padding: 22px; }

    /* 유틸 */
    .empty-hint { text-align: center; padding: 60px 24px; color: #B8A795; font-size: 15px; line-height: 1.8; }
  </style>
</head>
<body>
<div class="app">

  <!-- 로그인 화면 -->
  <div id="screen-login" class="screen active">
    <div class="login-wrap">
      <div class="food-icon food-icon--hero icon-orange">🍜</div>
      <div class="login-title">단골집 주문</div>
      <div class="login-sub">부모님이 쉽게 전화 주문할 수 있도록<br>가게와 메뉴를 등록해드리세요</div>
      <button class="google-btn" id="google-login-btn" onclick="loginWithGoogle()">
        <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.7 2.5 30.2 0 24 0 14.6 0 6.6 5.6 2.7 13.7l7.8 6C12.4 13.1 17.8 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.9 7.2l7.6 5.9C43.7 37.5 46.5 31.4 46.5 24.5z"/><path fill="#FBBC05" d="M10.5 28.5c-.6-1.6-.9-3.2-.9-5s.3-3.4.9-5l-7.8-6C1 15.6 0 19.7 0 24s1 8.4 2.7 11.5l7.8-6z"/><path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.6-5.9c-2.1 1.4-4.7 2.2-7.6 2.2-6.2 0-11.5-3.7-13.5-9l-7.8 6C6.6 42.4 14.6 48 24 48z"/></svg>
        Google로 시작하기
      </button>
      <div class="inapp-notice" id="inapp-notice" style="display:none;">
        <div class="inapp-notice-title">⚠️ 인앱 브라우저에서는 로그인이 안 돼요</div>
        <div class="inapp-notice-desc">카카오톡 등 앱 안에서 연 화면은 구글 정책상 로그인이 막혀요.<br>오른쪽 위 <b>⋯ 메뉴 → 다른 브라우저로 열기</b>를 눌러<br>Safari(또는 Chrome)에서 다시 열어주세요.</div>
        <button class="copy-btn" onclick="copyCurrentLink()">📋 현재 주소 복사하기</button>
      </div>
    </div>
  </div>

  <!-- 관리자 홈 -->
  <div id="screen-home" class="screen">
    <div class="topbar">
      <div class="food-icon food-icon--sm icon-orange">🍜</div>
      <span class="topbar-title">단골집 관리</span>
      <button class="logout-btn" onclick="logout()">로그아웃</button>
    </div>
    <div class="store-list" id="store-list"></div>
    <button class="add-btn" onclick="showEdit(null)">＋ 가게 추가하기</button>
    <div class="share-panel">
      <div class="share-label">🏠 우리집 주소</div>
      <div class="address-row">
        <input type="text" id="f-address" placeholder="배달 주문 시 사용할 주소">
        <button class="address-save-btn" onclick="saveAddress()">저장</button>
      </div>
    </div>
    <div class="share-panel">
      <div class="share-label">📮 부모님께 보낼 링크</div>
      <div class="share-url" id="share-url-text">가게를 추가하면 링크가 생성됩니다</div>
      <div class="share-btns">
        <button class="copy-btn" onclick="copyLink()">📋 링크 복사</button>
        <button class="kakao-btn" onclick="shareLink()">💬 카톡으로 보내기</button>
      </div>
    </div>
  </div>

  <!-- 가게 등록/수정 -->
  <div id="screen-edit" class="screen">
    <div class="topbar">
      <button class="back-btn" onclick="showHome()" aria-label="뒤로">‹</button>
      <span class="topbar-title" id="edit-title">가게 등록</span>
    </div>
    <div class="form-section">
      <div class="field-group">
        <label class="field-label">🏠 가게 이름</label>
        <input type="text" id="f-name" placeholder="예) 단골 짜장면집">
      </div>
      <div class="field-group">
        <label class="field-label">📞 전화번호</label>
        <input type="tel" id="f-phone" placeholder="예) 02-1234-5678">
      </div>
      <div class="field-group">
        <label class="field-label">🍽 자주 시키는 메뉴</label>
        <div id="menu-chips" class="menu-chip-list"></div>
        <div class="menu-input-row">
          <input type="text" id="f-menu" placeholder="메뉴 입력 후 + 버튼" onkeydown="if(event.key==='Enter')addMenu()">
          <button class="add-menu-btn" onclick="addMenu()" aria-label="메뉴 추가">＋</button>
        </div>
      </div>
      <button class="save-btn" onclick="saveStore()">저장하기</button>
    </div>
  </div>

  <!-- 부모님 홈 -->
  <div id="screen-parent" class="screen">
    <div class="topbar">
      <div class="food-icon food-icon--sm icon-orange">🍜</div>
      <div class="topbar-group">
        <div class="topbar-title">어디서 시킬까요?</div>
        <div class="topbar-sub">오늘은 뭐 드실래요?</div>
      </div>
    </div>
    <div class="reorder-section" id="reorder-section" style="display:none;"></div>
    <div class="parent-list" id="parent-list"></div>
  </div>

  <!-- 메뉴 선택 -->
  <div id="screen-order" class="screen">
    <div class="topbar">
      <button class="back-btn" onclick="showParent()" aria-label="뒤로">‹</button>
      <div class="food-icon food-icon--sm" id="order-store-icon"></div>
      <span class="topbar-title" id="order-store-name"></span>
    </div>
    <div class="order-heading">무엇을 드실까요?</div>
    <div class="menu-order-list" id="menu-order-list"></div>
    <div class="order-type-heading">어떻게 받으실까요?</div>
    <div class="order-type-toggle">
      <button class="order-type-btn" id="type-pickup" onclick="selectOrderType('포장')">🛍️ 포장</button>
      <button class="order-type-btn" id="type-delivery" onclick="selectOrderType('배달')">🛵 배달</button>
    </div>
    <div class="order-bar">
      <div class="order-summary" id="order-summary">메뉴를 골라주세요</div>
      <button class="call-btn" id="call-btn" onclick="doCall()" disabled>📞 전화 주문하기</button>
    </div>
  </div>

  <!-- 주문 메모 -->
  <div id="screen-memo" class="screen">
    <div class="topbar">
      <button class="back-btn" onclick="backToOrder()" aria-label="뒤로">‹</button>
      <span class="topbar-title">주문 메모</span>
    </div>
    <div class="memo-section">
      <div class="memo-card">

      </div>
      <div class="memo-script-label">📋 이렇게 말씀해보세요</div>

  </div>

</div>

<!-- Firebase SDK -->
<script type="module">
  // ✅ 개발용 스위치: true면 Firebase 없이 로컬(목 로그인 + localStorage)에서 동작.
  //    실제 배포 전에는 false로 바꾸고 아래 firebaseConfig를 채워주세요.
  const DEV_MODE = false;

  // ✅ 여기에 Firebase 설정값 붙여넣기 (DEV_MODE = false 일 때 사용)
  const firebaseConfig = {
    apiKey: "AIzaSyCTxiOLyneie95HgVu1KOCpbQU6Su-KwSc",
    authDomain: "parents-order.firebaseapp.com",
    databaseURL: "https://parents-order-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "parents-order",
    storageBucket: "parents-order.firebasestorage.app",
    messagingSenderId: "752416834409",
    appId: "1:752416834409:web:724148d1971827c7e073f8",
    measurementId: "G-VCR1MJZ5YM"
  };

  // Firebase / 목 구현이 채워질 핸들 (모듈 스코프에서 재할당하기 위해 let 사용)
  let auth, db;
  let ref, set, get, onValue, remove;
  let GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged;

  if (DEV_MODE) {
    setupMockBackend();
  } else {
    const appMod  = await import("./vendor/firebase/firebase-app.js");
    const authMod = await import("./vendor/firebase/firebase-auth.js");
    const dbMod   = await import("./vendor/firebase/firebase-database.js");
    ({ GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } = authMod);
    ({ ref, set, get, onValue, remove } = dbMod);
    const app = appMod.initializeApp(firebaseConfig);
    auth = authMod.getAuth(app);
    db = dbMod.getDatabase(app);
  }

  // ──────────────────────────────
  // 목 백엔드 (개발 전용) — localStorage 기반 가짜 RTDB + 가짜 Google 로그인
  // ──────────────────────────────
  function setupMockBackend() {
    const DB_KEY = 'parents-order-mock-db';
    const AUTH_KEY = 'parents-order-mock-auth';
    const MOCK_USER = { uid: 'dev-user-001', displayName: '개발자' };

    const load = () => { try { return JSON.parse(localStorage.getItem(DB_KEY)) || {}; } catch { return {}; } };
    const save = (data) => localStorage.setItem(DB_KEY, JSON.stringify(data));
    const parts = (path) => path.split('/').filter(Boolean);
    const getPath = (obj, path) => parts(path).reduce((cur, p) => (cur == null ? undefined : cur[p]), obj);
    const setPath = (obj, path, value) => {
      const ps = parts(path); let cur = obj;
      for (let i = 0; i < ps.length - 1; i++) {
        if (typeof cur[ps[i]] !== 'object' || cur[ps[i]] == null) cur[ps[i]] = {};
        cur = cur[ps[i]];
      }
      cur[ps[ps.length - 1]] = value;
    };
    const removePath = (obj, path) => {
      const ps = parts(path); let cur = obj;
      for (let i = 0; i < ps.length - 1; i++) { if (cur[ps[i]] == null) return; cur = cur[ps[i]]; }
      delete cur[ps[ps.length - 1]];
    };
    const snapshot = (val) => ({ exists: () => val !== undefined && val !== null, val: () => val });

    const listeners = [];
    const notify = (changedPath) => {
      const data = load();
      listeners.forEach(({ path, cb }) => {
        if (changedPath === path || changedPath.startsWith(path + '/') || path.startsWith(changedPath + '/')) {
          cb(snapshot(getPath(data, path)));
        }
      });
    };

    // 첫 실행 시 샘플 가게 한 곳 자동 등록 (개발 편의용)
    const seed = load();
    if (!getPath(seed, `families/${MOCK_USER.uid}/stores`)) {
      setPath(seed, `families/${MOCK_USER.uid}/owner`, MOCK_USER.uid);
      setPath(seed, `families/${MOCK_USER.uid}/stores/sample1`, {
        name: '단골 짜장면집', phone: '02-1234-5678',
        menus: ['짜장면', '짬뽕', '탕수육']
      });
      save(seed);
    }

    ref = (_db, path) => ({ _path: path });
    get = async (r) => snapshot(getPath(load(), r._path));
    set = async (r, value) => { const d = load(); setPath(d, r._path, value); save(d); notify(r._path); };
    remove = async (r) => { const d = load(); removePath(d, r._path); save(d); notify(r._path); };
    onValue = (r, cb) => {
      const entry = { path: r._path, cb };
      listeners.push(entry);
      cb(snapshot(getPath(load(), r._path)));
      return () => { const i = listeners.indexOf(entry); if (i >= 0) listeners.splice(i, 1); };
    };

    let authCb = null;
    GoogleAuthProvider = function () {};
    onAuthStateChanged = (_auth, cb) => {
      authCb = cb;
      cb(localStorage.getItem(AUTH_KEY) === '1' ? MOCK_USER : null);
    };
    signInWithPopup = async () => { localStorage.setItem(AUTH_KEY, '1'); if (authCb) authCb(MOCK_USER); };
    signOut = async () => { localStorage.removeItem(AUTH_KEY); if (authCb) authCb(null); };
    auth = {}; db = {};

    // 화면 우상단에 개발 모드 배지 표시
    const badge = document.createElement('div');
    badge.textContent = 'DEV';
    badge.style.cssText = 'position:fixed;top:8px;right:8px;z-index:9999;background:#c0392b;color:#fff;font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;font-family:sans-serif;';
    document.body.appendChild(badge);
    console.log('[DEV_MODE] Firebase 없이 로컬 목 백엔드로 동작 중입니다. (localStorage)');
  }

  let familyId = null;
  let editMenus = [];
  let editingStoreKey = null;
  let currentStoreData = null;
  let currentStoreKey = null;
  let selectedMenus = [];
  let selectedOrderType = '포장';
  let parentStores = {};
  let reorderItems = [];
  let familyAddress = '';
  let unsubscribeStores = null;

  // ──────────────────────────────
  // 화면 전환
  // ──────────────────────────────
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  // ──────────────────────────────
  // 유틸
  // ──────────────────────────────
  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  // 가게/메뉴 이름 키워드로 음식 클레이 아이콘 매핑
  const FOOD_ICON_TYPES = [
    { keys: ['치킨', '닭'], emoji: '🍗', cls: 'icon-red' },
    { keys: ['피자'], emoji: '🍕', cls: 'icon-tomato' },
    { keys: ['김밥', '돈까스', '라면', '분식', '초밥'], emoji: '🍙', cls: 'icon-yellow' },
    { keys: ['죽'], emoji: '🥣', cls: 'icon-green' },
    { keys: ['탕수육', '새우', '튀김'], emoji: '🍤', cls: 'icon-red' },
  ];
  const DEFAULT_FOOD_ICON = { emoji: '🍜', cls: 'icon-orange' };

  function getFoodIcon(text) {
    const found = FOOD_ICON_TYPES.find(t => t.keys.some(k => String(text).includes(k)));
    return found || DEFAULT_FOOD_ICON;
  }

  // 카카오톡 등 인앱 브라우저는 구글 로그인을 차단하므로 미리 감지
  function isInAppBrowser() {
    const ua = navigator.userAgent || '';
    return /KAKAOTALK|Instagram|FBAN|FBAV|Line\/|NAVER|Whale|DaumApps/i.test(ua)
      || (/Android/i.test(ua) && /; ?wv\)/i.test(ua));
  }

  window.showHome = () => { showScreen('screen-home'); loadStores(); loadAddress(); };
  window.showEdit = (storeKey) => {
    editingStoreKey = storeKey;
    document.getElementById('edit-title').textContent = storeKey ? '가게 수정' : '가게 등록';
    if (storeKey) {
      get(ref(db, `families/${familyId}/stores/${storeKey}`)).then(snap => {
        const s = snap.val();
        document.getElementById('f-name').value = s.name;
        document.getElementById('f-phone').value = s.phone;
        editMenus = s.menus || [];
        renderMenuChips();
      });
    } else {
      document.getElementById('f-name').value = '';
      document.getElementById('f-phone').value = '';
      editMenus = [];
      renderMenuChips();
    }
    showScreen('screen-edit');
  };
  window.showParent = () => { showScreen('screen-parent'); };

  // ──────────────────────────────
  // 인증
  // ──────────────────────────────
  window.loginWithGoogle = async () => {
    const provider = new GoogleAuthProvider();
    await signInWithPopup(auth, provider);
  };

  window.copyCurrentLink = () => {
    navigator.clipboard.writeText(location.href)
      .then(() => alert('주소가 복사되었습니다.\nSafari(또는 Chrome)에서 붙여넣어 열어주세요.'))
      .catch(() => prompt('아래 주소를 복사하세요:', location.href));
  };

  // 인앱 브라우저에서는 구글 로그인 버튼 대신 안내 문구 표시 (부모님 모드는 로그인이 필요 없으므로 제외)
  const isParentMode = new URLSearchParams(location.search).has('fid');
  if (!isParentMode && isInAppBrowser()) {
    document.getElementById('google-login-btn').style.display = 'none';
    document.getElementById('inapp-notice').style.display = 'block';
  }

  window.logout = async () => {
    if (unsubscribeStores) { unsubscribeStores(); unsubscribeStores = null; }
    await signOut(auth);
    showScreen('screen-login');
  };

  onAuthStateChanged(auth, async user => {
    // 부모님 모드: URL에 ?fid=xxx 있으면 로그인 없이 바로 주문 화면
    const params = new URLSearchParams(location.search);
    const fid = params.get('fid');
    if (fid) {
      familyId = fid;
      await loadParentStores();
      showScreen('screen-parent');
      return;
    }

    if (user) {
      familyId = user.uid;
      // 최초 가입 시 families/{uid} 초기화
      const snap = await get(ref(db, `families/${familyId}`));
      if (!snap.exists()) {
        await set(ref(db, `families/${familyId}/owner`), user.uid);
      }
      showHome();
    } else {
      showScreen('screen-login');
    }
  });

  // ──────────────────────────────
  // 가게 로드 (관리자)
  // ──────────────────────────────
  function loadStores() {
    if (unsubscribeStores) { unsubscribeStores(); unsubscribeStores = null; }
    unsubscribeStores = onValue(ref(db, `families/${familyId}/stores`), snap => {
      const el = document.getElementById('store-list');
      if (!snap.exists()) {
        el.innerHTML = '<div class="empty-hint">🏪<br>등록된 가게가 없어요.<br>아래 버튼으로 추가해보세요!</div>';
        document.getElementById('share-url-text').textContent = '가게를 추가하면 링크가 생성됩니다';
        return;
      }
      const stores = snap.val();
      el.innerHTML = Object.entries(stores).map(([key, s]) => {
        const icon = getFoodIcon(s.name);
        const menuTags = (s.menus || []).map(m => `<span class="menu-tag">${escapeHtml(m)}</span>`).join('');
        return `
        <div class="store-card">
          <div class="store-card-head">
            <div class="food-icon food-icon--lg ${icon.cls}">${icon.emoji}</div>
            <div class="store-info">
              <div class="store-name">${escapeHtml(s.name)}</div>
              <div class="store-meta">${escapeHtml(s.phone)}</div>
            </div>
          </div>
          ${menuTags ? `<div class="store-menus">${menuTags}</div>` : ''}
          <div class="store-actions">
            <button class="btn-sm" onclick="showEdit('${key}')">✏️ 수정</button>
            <button class="btn-sm danger" onclick="deleteStore('${key}')">🗑 삭제</button>
          </div>
        </div>
      `;
      }).join('');

      // 공유 링크 갱신
      const base = location.href.split('?')[0];
      document.getElementById('share-url-text').textContent = `${base}?fid=${familyId}`;
    }, { onlyOnce: false });
  }

  // ──────────────────────────────
  // 우리집 주소 (배달 주문 시 안내용)
  // ──────────────────────────────
  async function loadAddress() {
    const snap = await get(ref(db, `families/${familyId}/address`));
    document.getElementById('f-address').value = snap.exists() ? snap.val() : '';
  }

  window.saveAddress = async () => {
    const address = document.getElementById('f-address').value.trim();
    await set(ref(db, `families/${familyId}/address`), address);
    alert('주소가 저장되었습니다.');
  };

  // ──────────────────────────────
  // 가게 저장
  // ──────────────────────────────
  window.saveStore = async () => {
    addMenu(); // 입력칸에 남아있는 메뉴 텍스트가 있으면 먼저 칩으로 추가
    const name = document.getElementById('f-name').value.trim();
    const phone = document.getElementById('f-phone').value.trim();
    if (!name || !phone) { alert('가게 이름과 전화번호를 입력해주세요'); return; }
    const key = editingStoreKey || Date.now().toString();
    await set(ref(db, `families/${familyId}/stores/${key}`), { name, phone, menus: [...editMenus] });
    showHome();
  };

  window.deleteStore = async (key) => {
    if (!confirm('이 가게를 삭제할까요?')) return;
    await remove(ref(db, `families/${familyId}/stores/${key}`));
  };

  // ──────────────────────────────
  // 메뉴 칩
  // ──────────────────────────────
  window.addMenu = () => {
    const inp = document.getElementById('f-menu');
    const v = inp.value.trim();
    if (!v) return;
    editMenus.push(v);
    inp.value = '';
    renderMenuChips();
    inp.focus();
  };
  window.removeMenu = (i) => { editMenus.splice(i, 1); renderMenuChips(); };

  function renderMenuChips() {
    document.getElementById('menu-chips').innerHTML = editMenus.map((m, i) =>
      `<span class="menu-chip">${escapeHtml(m)}<button class="del" onclick="removeMenu(${i})">×</button></span>`
    ).join('');
  }

  // ──────────────────────────────
  // 공유 링크
  // ──────────────────────────────
  window.copyLink = () => {
    const url = `${location.href.split('?')[0]}?fid=${familyId}`;
    navigator.clipboard.writeText(url)
      .then(() => alert('링크 복사 완료!\n카톡으로 부모님께 보내주세요.'))
      .catch(() => prompt('아래 링크를 복사하세요:', url));
  };
  window.shareLink = () => {
    const url = `${location.href.split('?')[0]}?fid=${familyId}`;
    if (navigator.share) {
      navigator.share({ title: '부모님 단골집 주문', url });
    } else {
      prompt('카카오톡에 붙여넣기 해서 보내세요:', url);
    }
  };

  // ──────────────────────────────
  // 부모님 화면
  // ──────────────────────────────
  async function loadParentStores() {
    const addressSnap = await get(ref(db, `families/${familyId}/address`));
    familyAddress = addressSnap.exists() ? addressSnap.val() : '';

    const snap = await get(ref(db, `families/${familyId}/stores`));
    const el = document.getElementById('parent-list');
    if (!snap.exists()) {
      el.innerHTML = '<div class="empty-hint">등록된 가게가 없어요.<br>자녀에게 등록 요청해보세요.</div>';
      return;
    }
    parentStores = snap.val();
    el.innerHTML = Object.entries(parentStores).map(([key, s]) => {
      const icon = getFoodIcon(s.name);
      return `
      <button class="parent-store-card" onclick="showOrder('${key}')">
        <div class="food-icon food-icon--xl ${icon.cls}">${icon.emoji}</div>
        <div class="parent-store-info">
          <div class="parent-store-name">${escapeHtml(s.name)}</div>
          <div class="parent-store-meta">${escapeHtml((s.menus || []).join(' · ') || '메뉴 없음')}</div>
        </div>
        <div class="parent-store-arrow">›</div>
      </button>
    `;
    }).join('');

    renderReorders();
  }

  // ──────────────────────────────
  // 원터치 재주문 (부모님 기기 localStorage에 주문 이력 보관)
  // ──────────────────────────────
  function historyKey() {
    return `parents-order-history-${familyId}`;
  }

  function loadHistory() {
    try {
      return JSON.parse(localStorage.getItem(historyKey())) || [];
    } catch {
      return [];
    }
  }

  // 전화 걸기 시점에 주문 1건 기록 (최근 50건만 보관)
  function recordOrder() {
    if (!currentStoreKey || !selectedMenus.length) return;
    const history = loadHistory();
    history.unshift({
      storeKey: currentStoreKey,
      menus: [...selectedMenus],
      orderType: selectedOrderType,
      ts: Date.now()
    });
    localStorage.setItem(historyKey(), JSON.stringify(history.slice(0, 50)));
  }

  // 이력을 (가게·메뉴·포장배달) 단위로 묶어 자주+최근 순 상위 3개만 노출
  function renderReorders() {
    const section = document.getElementById('reorder-section');
    const groups = new Map();

    loadHistory().forEach(o => {
      const store = parentStores[o.storeKey];
      if (!store) return; // 삭제된 가게 제외
      const menus = (o.menus || []).filter(m => (store.menus || []).includes(m));
      if (!menus.length) return; // 메뉴가 모두 사라진 주문 제외
      const sig = `${o.storeKey}|${[...menus].sort().join(',')}|${o.orderType}`;
      const prev = groups.get(sig);
      if (prev) {
        prev.count++;
        if (o.ts > prev.ts) prev.ts = o.ts;
        return;
      }
      groups.set(sig, { storeKey: o.storeKey, menus, orderType: o.orderType, count: 1, ts: o.ts });
    });

    reorderItems = [...groups.values()]
      .sort((a, b) => b.count - a.count || b.ts - a.ts)
      .slice(0, 3);

    if (!reorderItems.length) {
      section.style.display = 'none';
      section.innerHTML = '';
      return;
    }

    section.style.display = 'block';
    section.innerHTML = `
      <div class="reorder-heading">⭐ 다시 주문하기</div>
      <div class="reorder-list">
        ${reorderItems.map((it, i) => {
          const store = parentStores[it.storeKey];
          const icon = getFoodIcon(store.name);
          const typeBadge = it.orderType === '배달' ? '🛵 배달' : '🛍️ 포장';
          const countBadge = it.count > 1 ? ` · ${it.count}번 주문` : '';
          return `
          <button class="reorder-card" onclick="reorder(${i})">
            <div class="food-icon food-icon--lg ${icon.cls}">${icon.emoji}</div>
            <div class="reorder-info">
              <div class="reorder-store">${escapeHtml(store.name)}</div>
              <div class="reorder-menus">${escapeHtml(it.menus.join(', '))}</div>
              <span class="reorder-badge">${typeBadge}${countBadge}</span>
            </div>
            <div class="reorder-cta"><span class="ic">📞</span>바로주문</div>
          </button>`;
        }).join('')}
      </div>
      <div class="reorder-divider">다른 가게에서 주문하기</div>`;
  }

  // 재주문 카드 탭 → 메뉴·포장배달 자동 선택 후 바로 전화 메모 화면으로
  window.reorder = (i) => {
    const it = reorderItems[i];
    if (!it || !parentStores[it.storeKey]) return;
    showOrder(it.storeKey); // 주문 화면을 먼저 구성 (메모에서 뒤로 가기 대비)
    it.menus.forEach(m => {
      const idx = (currentStoreData.menus || []).indexOf(m);
      if (idx !== -1) toggleMenu(idx);
    });
    selectedOrderType = it.orderType;
    updateOrderTypeUI();
    doCall();
  };

  window.showOrder = (key) => {
    currentStoreData = parentStores[key];
    currentStoreKey = key;
    selectedMenus = [];
    selectedOrderType = '포장';
    updateOrderTypeUI();
    document.getElementById('order-store-name').textContent = currentStoreData.name;
    const storeIcon = getFoodIcon(currentStoreData.name);
    const storeIconEl = document.getElementById('order-store-icon');
    storeIconEl.className = `food-icon food-icon--sm ${storeIcon.cls}`;
    storeIconEl.textContent = storeIcon.emoji;
    const menus = currentStoreData.menus || [];
    const el = document.getElementById('menu-order-list');
    el.innerHTML = menus.length
      ? menus.map((m, i) => {
          const icon = getFoodIcon(m);
          return `
          <div class="menu-item" id="mi-${i}" onclick="toggleMenu(${i})">
            <div class="food-icon food-icon--md ${icon.cls}">${icon.emoji}</div>
            <span class="menu-item-name">${escapeHtml(m)}</span>
            <div class="menu-check" id="mc-${i}"></div>
          </div>
        `;
        }).join('')
      : '<div class="empty-hint">등록된 메뉴가 없어요.</div>';
    updateOrderBar();
    showScreen('screen-order');
  };

  window.toggleMenu = (i) => {
    const name = currentStoreData.menus[i];
    const item = document.getElementById('mi-' + i);
    const chk = document.getElementById('mc-' + i);
    const idx = selectedMenus.indexOf(name);
    if (idx === -1) {
      selectedMenus.push(name);
      item.classList.add('selected');
      chk.textContent = '✓';
    } else {
      selectedMenus.splice(idx, 1);
      item.classList.remove('selected');
      chk.textContent = '';
    }
    updateOrderBar();
  };

  function updateOrderBar() {
    const btn = document.getElementById('call-btn');
    const sum = document.getElementById('order-summary');
    if (!selectedMenus.length) {
      sum.textContent = '메뉴를 골라주세요';
      btn.disabled = true;
    } else {
      sum.innerHTML = `선택한 메뉴 · <b>${escapeHtml(selectedMenus.join(', '))}</b>`;
      btn.disabled = false;
    }
  }

  function updateOrderTypeUI() {
    document.getElementById('type-pickup').classList.toggle('selected', selectedOrderType === '포장');
    document.getElementById('type-delivery').classList.toggle('selected', selectedOrderType === '배달');
  }

  window.selectOrderType = (type) => {
    selectedOrderType = type;
    updateOrderTypeUI();
  };

  window.doCall = () => {
    document.getElementById('memo-store-name').textContent = currentStoreData.name;
    document.getElementById('memo-phone').textContent = currentStoreData.phone;
    const typeText = selectedOrderType === '배달' ? '배달로' : '포장으로';
    let script = `${selectedMenus.join(', ')} ${typeText} 주세요.`;
    if (selectedOrderType === '배달' && familyAddress) {
      script += `\n주소는 ${familyAddress}입니다.`;
    }
    document.getElementById('memo-script').textContent = script;
    showScreen('screen-memo');
  };

  window.callStore = () => {
    recordOrder();
    location.href = 'tel:' + currentStoreData.phone.replace(/[^0-9+]/g, '');
  };

  window.backToOrder = () => showScreen('screen-order');
</script>
</body>
</html>
